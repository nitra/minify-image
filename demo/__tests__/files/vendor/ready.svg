<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <title>Vendor SVG that needs optimization but is intentionally ignored</title>
  <desc>This file proves that vendor/* glob ignore works even for compressible files</desc>
